name: Static Build for PHP 8.5

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-static-php-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  meta:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.cfg.outputs.php_version }}
      spc_version: ${{ steps.cfg.outputs.spc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read build config
        id: cfg
        shell: bash
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")
            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "php_version=#{cfg.fetch("php-version")}"
              f.puts "spc_version=#{cfg.fetch("spc-version")}"
            end
          '

  build:
    name: ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            spc_url_suffix: linux-x86_64.tar.gz
            artifact_os: linux
            artifact_arch: x64

          - os: ubuntu-24.04-arm
            label: linux-arm64
            spc_url_suffix: linux-aarch64.tar.gz
            artifact_os: linux
            artifact_arch: arm64

          - os: macos-15-intel
            label: macos-x64
            spc_url_suffix: macos-x86_64.tar.gz
            artifact_os: mac
            artifact_arch: x64

          - os: macos-latest
            label: macos-arm64
            spc_url_suffix: macos-aarch64.tar.gz
            artifact_os: mac
            artifact_arch: arm64

          - os: windows-latest
            label: windows-x64
            spc_url_suffix: windows-x64.exe
            artifact_os: win
            artifact_arch: x64

    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set SPC binary name (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: echo "SPC_BINARY=spc" >> $GITHUB_ENV

      - name: Set SPC binary name (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: echo "SPC_BINARY=spc.exe" >> $GITHUB_ENV

      - name: Set SPC URL
        shell: bash
        run: |
          echo "SPC_URL=https://github.com/crazywhalecc/static-php-cli/releases/download/${{ needs.meta.outputs.spc_version }}/spc-${{ matrix.spc_url_suffix }}" >> $GITHUB_ENV

      - name: Setup system PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          extensions: curl, openssl, mbstring, sodium, tokenizer, filter
          ini-values: memory_limit=-1

      - name: Read extension and library lists
        id: cfg
        shell: bash
        run: |
          EXTENSIONS=$(php -r "echo trim(file_get_contents('extensions.txt'));")
          LIBRARIES=$(php -r "echo trim(file_get_contents('libs.txt'));")
          EXT_HASH=$(php -r "echo md5(trim(file_get_contents('extensions.txt')));")

          {
            echo "extensions=$EXTENSIONS"
            echo "libraries=$LIBRARIES"
            echo "ext_hash=$EXT_HASH"
          } >> "$GITHUB_OUTPUT"

      - name: Download SPC (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd ..
          curl -fsSL -o spc.tar.gz "${{ env.SPC_URL }}"
          tar -xzf spc.tar.gz
          chmod +x spc
          mkdir -p static-php-cli/bin
          mv spc static-php-cli/bin/

      - name: Download SPC (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location ..
          Invoke-WebRequest -Uri "${{ env.SPC_URL }}" -OutFile "spc.exe"
          New-Item -ItemType Directory -Force -Path "static-php-cli\bin" | Out-Null
          Move-Item "spc.exe" "static-php-cli\bin\spc.exe"

      - name: Create working directories
        shell: bash
        run: |
          cd ..
          mkdir -p php-bin
          mkdir -p static-php-cli/downloads

      - name: Cache SPC downloads
        id: cache-downloads
        uses: actions/cache@v5
        with:
          path: ../static-php-cli/downloads
          key: spc-downloads-${{ needs.meta.outputs.php_version }}-${{ steps.cfg.outputs.ext_hash }}-${{ runner.os }}-${{ matrix.artifact_arch }}

      - name: SPC doctor (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd ../static-php-cli
          ./bin/spc doctor

      - name: SPC doctor (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location ..\static-php-cli
          .\bin\spc.exe doctor

      - name: Download sources (Unix)
        if: matrix.os != 'windows-latest' && steps.cache-downloads.outputs.cache-hit != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ../static-php-cli
          ./bin/spc download \
            --with-php=${{ needs.meta.outputs.php_version }} \
            --for-extensions "${{ steps.cfg.outputs.extensions }}" \
            --prefer-pre-built

      - name: Download sources (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-downloads.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-Location ..\static-php-cli
          .\bin\spc.exe download `
            --with-php=${{ needs.meta.outputs.php_version }} `
            --for-extensions "${{ steps.cfg.outputs.extensions }}" `
            --prefer-pre-built

      - name: Build PHP (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd ../static-php-cli
          ./bin/spc build \
            --build-cli "${{ steps.cfg.outputs.extensions }}" \
            --with-libs="${{ steps.cfg.outputs.libraries }}" \
            --debug

      - name: Build PHP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location ..\static-php-cli
          .\bin\spc.exe build `
            --build-cli "${{ steps.cfg.outputs.extensions }}" `
            --with-libs="${{ steps.cfg.outputs.libraries }}" `
            --debug

      - name: Prepare Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p package/bin package/meta package/LICENSES
          cp ../static-php-cli/buildroot/bin/php package/bin/
          cp ../static-php-cli/buildroot/build-*.json package/meta/ || true
          [ -d ../static-php-cli/buildroot/license ] && cp -r ../static-php-cli/buildroot/license/* package/LICENSES/ || true

      - name: Prepare Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package\bin, package\meta, package\LICENSES | Out-Null
          Copy-Item ..\static-php-cli\buildroot\bin\php.exe package\bin\
          Copy-Item "..\static-php-cli\buildroot\build-*.json" package\meta\ -ErrorAction SilentlyContinue
          if (Test-Path ..\static-php-cli\buildroot\license) {
            Copy-Item "..\static-php-cli\buildroot\license\*" package\LICENSES\ -ErrorAction SilentlyContinue
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-bin-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: package/
          retention-days: 1

  sync-repo:
    name: Sync to Repo
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: tmp-artifacts

      - name: Organize and Push
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          [ ! -d tmp-artifacts ] && exit 0

          found_any=0

          for dir in tmp-artifacts/php-bin-*; do
            [ ! -d "$dir" ] && continue
            found_any=1
            PLATFORM=$(basename "$dir" | sed 's/php-bin-//')

            mkdir -p "bin/$PLATFORM" "build-meta/$PLATFORM" "licenses/$PLATFORM"

            [ -d "$dir/bin" ] && cp -r "$dir/bin/"* "bin/$PLATFORM/" || true
            [ -d "$dir/meta" ] && cp -r "$dir/meta/"* "build-meta/$PLATFORM/" || true
            [ -d "$dir/LICENSES" ] && cp -r "$dir/LICENSES/"* "licenses/$PLATFORM/" 2>/dev/null || true
          done

          [ "$found_any" -eq 0 ] && exit 0

          git add bin/ build-meta/ licenses/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update static php binaries (partial/full update)"
            git push origin main
          fi
