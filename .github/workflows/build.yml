name: Build Static PHP binaries

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-static-php-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.cfg.outputs.php_version }}
      spc_version: ${{ steps.cfg.outputs.spc_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read build config
        id: cfg
        shell: bash
        run: |
          ruby -e '
            require "yaml"
            cfg = YAML.load_file("config.yml")
            File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
              f.puts "php_version=#{cfg.fetch("php-version")}"
              f.puts "spc_version=#{cfg.fetch("spc-version")}"
            end
          '

  build:
    name: ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            spc_url_suffix: linux-x86_64.tar.gz
            artifact_os: linux
            artifact_arch: x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            spc_url_suffix: linux-aarch64.tar.gz
            artifact_os: linux
            artifact_arch: arm64
          - os: macos-15-intel
            label: macos-x64
            spc_url_suffix: macos-x86_64.tar.gz
            artifact_os: mac
            artifact_arch: x64
          - os: macos-latest
            label: macos-arm64
            spc_url_suffix: macos-aarch64.tar.gz
            artifact_os: mac
            artifact_arch: arm64
          - os: windows-latest
            label: windows-x64
            spc_url_suffix: windows-x64.exe
            artifact_os: win
            artifact_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup system PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
          extensions: curl, openssl, mbstring, sodium, tokenizer, filter
          ini-values: memory_limit=-1

      - name: Read extension and library lists
        id: cfg
        shell: bash
        run: |
          EXTENSIONS=$(php -r "echo trim(file_get_contents('extensions.txt'));")
          LIBRARIES=$(php -r "echo trim(file_get_contents('libs.txt'));")
          EXT_HASH=$(php -r "echo md5(trim(file_get_contents('extensions.txt')));")

          {
            echo "extensions=$EXTENSIONS"
            echo "libraries=$LIBRARIES"
            echo "ext_hash=$EXT_HASH"
          } >> "$GITHUB_OUTPUT"

      - name: Download SPC
        shell: bash
        run: |
          cd ..
          mkdir -p static-php-cli/bin
          SPC_URL="https://github.com/crazywhalecc/static-php-cli/releases/download/${{ needs.meta.outputs.spc_version }}/spc-${{ matrix.spc_url_suffix }}"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            curl -fsSL -o "static-php-cli/bin/spc.exe" "$SPC_URL"
          else
            curl -fsSL -o "static-php-cli/bin/spc.tar.gz" "$SPC_URL"
            tar -xzf "static-php-cli/bin/spc.tar.gz" -C static-php-cli/bin
            chmod +x "static-php-cli/bin/spc"
          fi

      - name: Cache SPC downloads
        uses: actions/cache@v5
        with:
          path: ../static-php-cli/downloads
          key: spc-downloads-${{ needs.meta.outputs.php_version }}-${{ steps.cfg.outputs.ext_hash }}-${{ runner.os }}-${{ matrix.artifact_arch }}

      - name: SPC doctor
        shell: bash
        run: |
          cd static-php-cli
          SPC="./bin/spc"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && SPC="./bin/spc.exe"
          $SPC doctor

      - name: Download sources
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ../static-php-cli
          mkdir -p source/php-src downloads

          SPC="./bin/spc"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && SPC="./bin/spc.exe"

          $SPC download \
            --with-php=${{ needs.meta.outputs.php_version }} \
            --for-extensions "${{ steps.cfg.outputs.extensions }}" \
            --prefer-pre-built

      - name: Build PHP
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ../static-php-cli
          mkdir -p source/php-src

          SPC="./bin/spc"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && SPC="./bin/spc.exe"

          $SPC build \
            --build-cli "${{ steps.cfg.outputs.extensions }}" \
            --with-libs="${{ steps.cfg.outputs.libraries }}" \
            --debug

      - name: Prepare Package
        shell: bash
        run: |
          mkdir -p package/bin package/meta package/LICENSES
          EXE_EXT=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && EXE_EXT=".exe"

          cp "../static-php-cli/buildroot/bin/php${EXE_EXT}" "package/bin/"
          cp ../static-php-cli/buildroot/build-*.json package/meta/
          [ -d "../static-php-cli/buildroot/license" ] && cp -r ../static-php-cli/buildroot/license/* package/LICENSES/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-bin-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: package/
          retention-days: 1

  sync-repo:
    name: Sync to Repo
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: tmp-artifacts

      - name: Organize
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          [ ! -d tmp-artifacts ] && exit 0

          found_any=0

          for dir in tmp-artifacts/php-bin-*; do
            [ ! -d "$dir" ] && continue
            found_any=1
            PLATFORM=$(basename "$dir" | sed 's/php-bin-//')

            mkdir -p "bin/$PLATFORM" "build-meta/$PLATFORM" "licenses/$PLATFORM"

            [ -d "$dir/bin" ] && cp -r "$dir/bin/"* "bin/$PLATFORM/" || true
            [ -d "$dir/meta" ] && cp -r "$dir/meta/"* "build-meta/$PLATFORM/" || true
            [ -d "$dir/LICENSES" ] && cp -r "$dir/LICENSES/"* "licenses/$PLATFORM/" 2>/dev/null || true
          done

          [ "$found_any" -eq 0 ] && exit 0

          git add bin/ build-meta/ licenses/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update static php binaries (partial/full update)"
            git push origin main
          fi
